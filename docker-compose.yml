services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/smrt.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
    volumes:
      - smrt_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  smrt_data:
